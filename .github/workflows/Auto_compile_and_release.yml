# Description: Auto compile luci-app-passwall2
# Auto_compile_and_release.yml
name: "Auto compile with openwrt sdk"
permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.github/**'
  workflow_dispatch:

env:
  TZ: Asia/Shanghai
  packages: ${{ github.repository }}
  passwall2: OneNAS-space/openwrt-passwall2

jobs:
  job_auto_compile:
    runs-on: ubuntu-latest
    name: Matrix build (${{ matrix.sdk_ver }})/(${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86_64
            sdk_tag: openwrt/sdk:x86_64-25.12.5
            sdk_ver: "25.12"
          - platform: aarch64_cortex-a53
            sdk_tag: openwrt/sdk:qualcommax-ipq807x-25.12.5
            sdk_ver: "25.12"
          - platform: arm_cortex-a7_neon-vfpv4
            sdk_tag: openwrt/sdk:ipq40xx-generic-25.12.5
            sdk_ver: "25.12"

    steps:
    - name: Checkout code
      uses: actions/checkout@main
      with:
        fetch-depth: 0

    - name: Setup variables
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "BASE_SHA=$(git merge-base refs/remotes/origin/${{ github.base_ref }} ${{ github.event.pull_request.head.sha }})" >> $GITHUB_ENV
          echo "HEAD_SHA=${{ github.event.pull_request.head.sha }}" >> $GITHUB_ENV
          echo "MODE=changed" >> $GITHUB_ENV
        elif [ "${{ github.event_name }}" == "push" ]; then
          echo "BASE_SHA=${{ github.event.before }}" >> $GITHUB_ENV
          echo "HEAD_SHA=${{ github.event.after }}" >> $GITHUB_ENV
          echo "MODE=changed" >> $GITHUB_ENV
        else
          echo "MODE=all" >> $GITHUB_ENV
        fi

    - name: Detect changed directories
      if: env.MODE == 'changed'
      id: detect-changes
      run: |
        CHANGED_DIRS=$(git diff --name-only $BASE_SHA $HEAD_SHA | awk -F'/' '{print $1}' | sort -u | tr '\n' ',')
        CHANGED_DIRS=${CHANGED_DIRS%,}
        echo "CHANGED_DIRS=$CHANGED_DIRS" >> $GITHUB_ENV
        echo "Changed dirs: $CHANGED_DIRS"

    - name: Free disk space
      run: |
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android

    - name: Cache OpenWrt dl
      uses: actions/cache@v6
      with:
        path: dl
        key: ${{ runner.os }}-openwrt-${{ matrix.sdk_ver }}-${{ matrix.platform }}

    - name: Build in OpenWrt SDK Container
      run: |
        mkdir -p dl "staging/${{ matrix.sdk_ver }}/${{ matrix.platform }}"
        chmod 777 dl "staging/${{ matrix.sdk_ver }}/${{ matrix.platform }}"
        chmod +x .github/scripts/build-passwall2.sh

        docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -v ${{ github.workspace }}/dl:/builder/dl \
          -e MODE="${MODE}" \
          -e CHANGED_DIRS="${CHANGED_DIRS:-}" \
          -e SDK_VER="${{ matrix.sdk_ver }}" \
          -e PLATFORM="${{ matrix.platform }}" \
          -e PACKAGES_REPO="${{ env.packages }}" \
          -e PASSWALL2_REPO="${{ env.passwall2 }}" \
          ${{ matrix.sdk_tag }} \
          /workspace/.github/scripts/build-passwall2.sh

    - name: Fix dl cache permissions
      if: always()
      run: |
        sudo chown -R "$(id -u):$(id -g)" dl || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.sdk_ver }}-${{ matrix.platform }}
        path: staging/${{ matrix.sdk_ver }}/${{ matrix.platform }}

  publish:
    runs-on: ubuntu-latest
    needs: job_auto_compile
    permissions:
      contents: write
    steps:
      - name: 🔑 Checkout custom-packages
        uses: actions/checkout@v7
        with:
          repository: OneNAS-space/custom-packages
          token: ${{ secrets.CUSTOM_PACKAGES_TOKEN }}
          path: custom-packages

      - name: 📂 Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: 🚚 Consolidate into Repo
        run: |
          set -euo pipefail
          find ./artifacts -type f -name "*.apk" | while read -r f; do
            base=$(basename "$f")
            dir_name=$(basename $(dirname "$f"))
            sdk_ver=$(echo "$dir_name" | cut -d- -f1)
            platform=$(echo "$dir_name" | cut -d- -f2-)
            dest_dir="custom-packages/releases/packages-$sdk_ver/$platform/packages"
            mkdir -p "$dest_dir"
            pkgname=$(echo "$base" | sed -E 's/-[0-9].*//')
            rm -f "$dest_dir/${pkgname}"-*.apk
            cp -v "$f" "$dest_dir/"
          done

      - name: 🚀 Secure Push with Retries
        run: |
          cd custom-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto update: ${{ github.repository }} - $(date +'%Y-%m-%d %H:%M:%S')"
          for i in {1..5}; do
            if git pull --rebase origin main && git push origin main; then
              echo "✅ Push successful!"
              exit 0
            fi
            sleep 5
          done
          exit 1
