name: Sanitize Makefile

on:
  workflow_dispatch:
  push:
    paths:
      - '**/Makefile'
  pull_request:
    paths:
      - '**/Makefile'
permissions:
  contents: write
  
jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Remove unwanted deps from LUCI_DEPENDS
        run: |
          changed=0
          for f in $(git ls-files '**/Makefile'); do
            echo "Processing $f"
            before=$(md5sum "$f")

            for dep in xray-core v2ray-geoip v2ray-geosite; do
              if grep -q "\+$dep" "$f"; then
                echo "Removed +$dep from $f"
                sed -i "s/^\([[:space:]]*\)+$dep[[:space:]]*/\1/" "$f"
                sed -i "s/ +$dep//g" "$f"
              fi
            done

            after=$(md5sum "$f")
            if [ "$before" != "$after" ]; then
              changed=1
            fi
          done
          
          if [ $changed -eq 0 ]; then
            echo "No unwanted deps found"
          fi

      - name: Apply Custom Patches Pipeline
        run: |
          set -e

          PATCH_LIST="
            rule_lua.patch
          "

          for patch_file in $PATCH_LIST; do
            echo ""
            if [ -f "patches/$patch_file" ]; then
              echo "🔎 正在检测补丁状态: patches/$patch_file ..."
              
              # 1. 核心智能检测：尝试“虚拟反向应用”补丁
              # 如果返回 0，说明补丁内容已经存在于源码中（上游已合并）
              if patch -p1 --dry-run -R --silent < "patches/$patch_file" >/dev/null 2>&1; then
                echo "⏭️ [跳过] 上游源码已包含此补丁的内容，无需重复应用。"
                continue
              fi
              
              # 2. 如果上游没有，再测试当前补丁是否能“干净地正向应用”
              if patch -p1 --dry-run --silent < "patches/$patch_file" >/dev/null 2>&1; then
                echo "🩹 正在应用补丁 patches/$patch_file ..."
                patch --batch -p1 < "patches/$patch_file"
                echo "✅ $patch_file 应用成功！"
              else
                # 3. 如果既没应用过，正向应用还报错，说明上游代码大改，补丁彻底失效了
                echo "❌ 关键错误：$patch_file 既没有被提前应用，也无法干净地融合（可能上游结构已改变）。"
                exit 1
              fi
            else
              echo "❌ Critical Error: patches/$patch_file missing!"
              exit 1
            fi
          done

          # 4. 防御性清理：强制清除可能意外产生的任何 .orig 或 .rej 垃圾文件
          find . -name "*.orig" -o -name "*.rej" -exec rm -f {} +

      - name: Show diff
        run: git diff --color

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "ci: sanitize LUCI_DEPENDS in Makefile" || echo "No changes to commit"
          git push
