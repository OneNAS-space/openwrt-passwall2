name: Sanitize Makefile

on:
  workflow_dispatch:
  push:
    paths:
      - '**/Makefile'
  pull_request:
    paths:
      - '**/Makefile'
permissions:
  contents: write
  
jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main

      - name: Remove unwanted deps from LUCI_DEPENDS
        run: |
          changed=0
          for f in $(git ls-files '**/Makefile'); do
            echo "Processing $f"
            before=$(md5sum "$f")

            for dep in xray-core v2ray-geoip v2ray-geosite; do
              if grep -q "\+$dep" "$f"; then
                echo "Removed +$dep from $f"
                sed -i "s/^\([[:space:]]*\)+$dep[[:space:]]*/\1/" "$f"
                sed -i "s/ +$dep//g" "$f"
              fi
            done

            after=$(md5sum "$f")
            if [ "$before" != "$after" ]; then
              changed=1
            fi
          done
          
          if [ $changed -eq 0 ]; then
            echo "No unwanted deps found"
          fi

      - name: Apply Custom Patches Pipeline
        run: |
          set -e

          PATCH_LIST="
            rule_lua.patch
            uci-defaults.patch
            link_add_node.patch
            nodes_listvalue_com.patch
            nodes_value_com.patch
          "

          for patch_file in $PATCH_LIST; do
            echo ""
            if [ -f "patches/$patch_file" ]; then
              echo "🔎 Detecting the patch status: patches/$patch_file ..."
              
              # 1. Core Intelligent Detection: Try the "Virtual Reverse Application" patch
              # If 0 is returned, it means that the patch content already exists in the source code (the upstream has been merged)
              if patch -p1 --dry-run -R --silent < "patches/$patch_file" >/dev/null 2>&1; then
                echo "⏭️ [Skip] The upstream source code already contains the content of this patch, and there is no need to repeat the application."
                continue
              fi
              
              # 2. If there is no upstream, test whether the current patch can be "cleanly applied positively"
              if patch -p1 --dry-run --silent < "patches/$patch_file" >/dev/null 2>&1; then
                echo "🩹 Patch is being applied: patches/$patch_file ..."
                patch --batch -p1 < "patches/$patch_file"
                echo "✅ $patch_file Successful application!"
              else
                # 3. If it has not been applied and the positive application still reports an error, it means that the upstream code has been greatly changed and the patch has been completely invalidated.
                echo "❌ Key error: $patch_file is neither applied in advance nor can it be integrated cleanly (maybe the upstream structure has changed)."
                exit 1
              fi
            else
              echo "❌ Critical Error: patches/$patch_file missing!"
              exit 1
            fi
          done

          # 4. Defensive cleaning: forcibly remove any .orig or .rej junk files that may be accidentally generated
          find . \( -name "*.orig" -o -name "*.rej" \) -exec rm -f {} +
          git rm -f $(git ls-files '**/*.orig' '**/*.rej') 2>/dev/null || true

      - name: Show diff
        run: git diff --color

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "ci: sanitize LUCI_DEPENDS in Makefile" || echo "No changes to commit"
          git push
